default_language_version:
  python: python3.12

exclude: '^(benchmarks/.*/(data|results|output)/.*|ui-tui/src/rpc/generated\.ts)$'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^tests/test_runtime_checkpoint_bug2_deep\.py$

  - repo: local
    hooks:
      - id: conventional-commit-message
        name: conventional commit message
        entry: env PYTHONPATH=. python3 scripts/check_commit_file.py
        language: system
        stages: [commit-msg]

      - id: eslint-ui-tui
        name: eslint (ui-tui)
        entry: bash -c '[ -d ui-tui/node_modules ] || exit 0; cd ui-tui && npm run lint'
        language: system
        pass_filenames: false
        files: '^ui-tui/src/.*\.(ts|tsx)$'

      - id: prettier-ui-tui
        name: prettier (ui-tui)
        entry: bash -c '[ -d ui-tui/node_modules ] || exit 0; cd ui-tui && npx prettier --check "src/**/*.{ts,tsx}"'
        language: system
        pass_filenames: false
        files: '^ui-tui/src/.*\.(ts|tsx)$'

      - id: eslint-bridge
        name: eslint (bridge)
        entry: bash -c '[ -d bridge/node_modules ] || exit 0; cd bridge && npm run lint'
        language: system
        pass_filenames: false
        files: '^bridge/src/.*\.(ts|tsx)$'

      - id: prettier-bridge
        name: prettier (bridge)
        entry: bash -c '[ -d bridge/node_modules ] || exit 0; cd bridge && npx prettier --check "src/**/*.{ts,tsx}"'
        language: system
        pass_filenames: false
        files: '^bridge/src/.*\.(ts|tsx)$'
